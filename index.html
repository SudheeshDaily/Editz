<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheesh Editz - Updating</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    max-width:500px;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    opacity:0.9;
}

.loader{
    margin:25px auto;
    border:4px solid rgba(255,255,255,0.2);
    border-top:4px solid white;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
<h1>Sudheesh Editz</h1>

<div class="loader"></div>

<p>The page is currently updating.</p>
<p>Please try again after <b>4:00 PM, March 17 (IST)</b>.</p>

</div>

</body>
</html>
